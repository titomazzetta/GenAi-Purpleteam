# PurpleLab Configuration (Ollama-only)

lab:
  # Network interface for Suricata/Zeek capture.
  # Use "auto" to select the default-route interface.
  interface: auto
  subnet: 10.10.10.0/24

  # Target IP used by the emulation steps (curl/nmap/nc).
  # In the single-VM demo flow, localhost is fine.
  target_ip: 127.0.0.1

# Optional sensor locations (best-effort copies)
wazuh:
  alerts_file: /var/ossec/logs/alerts/alerts.json

suricata:
  eve_file: /var/log/suricata/eve.json
  rules_dir: /etc/suricata/rules

zeek:
  log_dir: /var/log/zeek/current/

auditd:
  log_file: /var/log/audit/audit.log

# Local LLM runtime (Ollama)
ai:
  provider: ollama
  model: mistral
  base_url: "http://localhost:11434"
  timeout_s: 180

# Feature toggles for setup
features:
  install_ollama: true
  install_zeek: true
  install_wazuh: false

paths:
  runs_base: ./runs
  log_file: ./logs/purplelab.log
