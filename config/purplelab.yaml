# PurpleLab Configuration

lab:
  interface: eth0
  subnet: 10.10.10.0/24
  target_ip: 127.0.0.1

wazuh:
  manager_ip: 127.0.0.1
  api:
    user: wazuh-wui
    password: "PurpleLab2025!"
  alerts_file: /var/ossec/logs/alerts/alerts.json

suricata:
  eve_file: /var/log/suricata/eve.json
  rules_dir: /etc/suricata/rules

zeek:
  log_dir: /var/log/zeek/current/

auditd:
  log_file: /var/log/audit/audit.log


# Enable / disable sensors
sensors:
  suricata: true
  zeek: false
  wazuh: false
  auditd: true


# AI Analysis Configuration
ai:
  enabled: true
  provider: ollama
  base_url: "http://localhost:11434"
  model: "mistral:latest"
  timeout_s: 600
  max_events_for_ai: 15
  max_bundle_chars: 60000


paths:
  runs_base: ./runs
  logs_dir: ./logs
  log_file: ./logs/purplelab.log