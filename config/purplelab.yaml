# PurpleLab Configuration (ARM64 Kali-friendly)

lab:
  interface: auto        # safer than hardcoding eth0; Suricata will still be configured
  subnet: 10.10.10.0/24
  target_ip: 127.0.0.1

wazuh:
  alerts_file: /var/ossec/logs/alerts/alerts.json

suricata:
  eve_file: /var/log/suricata/eve.json
  rules_dir: /etc/suricata/rules

zeek:
  log_dir: /var/log/zeek/current/

auditd:
  log_file: /var/log/audit/audit.log

# Optional toggles your pipeline can use (and you can reference in reports)
sensors:
  suricata: true
  zeek: false
  wazuh: false
  auditd: true

ai:
  provider: ollama
  base_url: "http://localhost:11434"
  model: "mistral:latest"
  timeout_s: 600

  # VM-hardening knobs (used by your updated ai_analyzer.py)
  max_events_for_ai: 15
  max_bundle_chars: 60000
  max_raw_chars_per_event: 250

features:
  install_ollama: true
  install_zeek: false
  install_wazuh: false

paths:
  runs_base: ./runs
  logs_dir: ./logs
  log_file: ./logs/purplelab.log