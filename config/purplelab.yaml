lab:
  interface: auto
  subnet: 10.10.10.0/24
  target_ip: 127.0.0.1

wazuh:
  alerts_file: /var/ossec/logs/alerts/alerts.json

suricata:
  eve_file: /var/log/suricata/eve.json
  rules_dir: /etc/suricata/rules

zeek:
  log_dir: /var/log/zeek/current/

auditd:
  log_file: /var/log/audit/audit.log

sensors:
  suricata: true
  zeek: false
  wazuh: false
  auditd: true

ai:

  enabled: true
  provider: ollama
  host: "http://localhost:11434"
  model_default: "llama3.1:8b-instruct"
  model_fallbacks:
    - "mistral:7b-instruct"
    - "phi3:mini"
  pull_default_on_setup: true

features:
  install_ollama: true
  install_zeek: false
  install_wazuh: false

paths:
  runs_base: ./runs
  logs_dir: ./logs
  log_file: ./logs/purplelab.log