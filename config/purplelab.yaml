# PurpleLab Configuration
lab:
  interface: eth0
  subnet: 10.10.10.0/24
  target_ip: 127.0.0.1

wazuh:
  manager_ip: 127.0.0.1
  api:
    user: wazuh-wui
    password: "PurpleLab2025!"
  alerts_file: /var/ossec/logs/alerts/alerts.json

